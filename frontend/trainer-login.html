<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Trainer Login - GymPro Management System">
    <title>Trainer Login | GymPro Management System</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
    <style>
        .login-card .input-group {
            position: relative;
            margin-bottom: 16px;
        }
        .login-card .input-group .input-icon {
            position: absolute; left: 14px; top: 14px;
            font-size: 1.1rem; color: var(--text-muted);
            pointer-events: none; z-index: 1;
        }
        .login-card .input-group input {
            width: 100%; padding: 14px 14px 14px 44px;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text-primary);
            font-family: inherit; font-size: 0.95rem;
            transition: all var(--transition); box-sizing: border-box;
        }
        .login-card .key-input-group {
            position: relative;
            margin-bottom: 20px;
        }
        .login-card .key-input-group .input-icon {
            position: absolute; left: 14px; top: 14px;
            font-size: 1.1rem; color: var(--text-muted);
            pointer-events: none; z-index: 1;
        }
        .login-card .key-input-group input {
            width: 100%; padding: 14px 14px 14px 44px;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text-primary);
            font-family: 'Courier New', monospace; font-size: 1.05rem;
            font-weight: 600; letter-spacing: 2px;
            transition: all var(--transition); box-sizing: border-box;
            text-transform: uppercase;
        }
        .login-card .key-input-group input::placeholder,
        .login-card .input-group input::placeholder {
            color: var(--text-muted); letter-spacing: 1px; text-transform: none;
            font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 400;
        }
        .login-card .key-input-group input:focus,
        .login-card .input-group input:focus {
            outline: none; border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
        }
        .trainer-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(34, 197, 94, 0.12); color: #4ade80;
            padding: 6px 14px; border-radius: 20px; font-size: 0.75rem;
            font-weight: 600; letter-spacing: 0.5px;
            margin-top: 8px;
        }
        .divider {
            display: flex; align-items: center; gap: 16px;
            margin: 24px 0; color: var(--text-muted); font-size: 0.8rem;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }
        .link-row {
            display: flex; justify-content: center; gap: 24px;
            margin-top: 16px; font-size: 0.82rem;
        }
        .link-row a {
            color: var(--text-secondary); transition: color var(--transition);
        }
        .link-row a:hover { color: var(--accent); }
        .link-row a span { font-weight: 600; }

        /* Green theme orbs for trainer */
        .login-page .orb-1 { background: #22c55e; }
        .login-page .orb-2 { background: #16a34a; }
        .login-page .orb-3 { background: #06b6d4; }

        .btn-login {
            background: linear-gradient(135deg, #22c55e, #16a34a) !important;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #16a34a, #15803d) !important;
        }
    </style>
</head>
<body>

    <div class="login-page">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>

        <div class="login-card">
            <div class="brand">
                <div class="brand-icon" style="background: linear-gradient(135deg, #22c55e, #16a34a);">🏋️</div>
                <h1>GymPro</h1>
                <p>Trainer Portal</p>
                <div class="trainer-badge">🏅 Trainer Access</div>
            </div>

            <div class="form-title">Trainer Sign In</div>

            <div class="error-message" id="errorMsg">
                <span>⚠️</span>
                <span id="errorText"></span>
            </div>

            <div class="success-message" id="successMsg">
                <span>✅</span>
                <span id="successText"></span>
            </div>

            <form id="trainerLoginForm" autocomplete="off">
                <div class="input-group">
                    <span class="input-icon">👤</span>
                    <input type="text" id="trainerName" placeholder="Enter your name" required autocomplete="name">
                </div>

                <div class="key-input-group">
                    <span class="input-icon">🔑</span>
                    <input type="text" id="accessKey" placeholder="Enter your access key" required autocomplete="off">
                </div>

                <button type="submit" class="btn-login" id="submitBtn">
                    <span class="btn-text" id="btnText">Sign In</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <div class="divider">or</div>

            <div class="link-row">
                <a href="login.html">
                    Admin? <span style="color: var(--accent);">Sign in →</span>
                </a>
                <a href="staff-login.html">
                    Staff? <span style="color: #60a5fa;">Sign in →</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';

        // If already logged in as trainer, redirect
        if (localStorage.getItem('gym_trainer')) {
            window.location.href = 'trainer-dashboard.html';
        }

        const form = document.getElementById('trainerLoginForm');
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');
        const successMsg = document.getElementById('successMsg');
        const successText = document.getElementById('successText');
        const submitBtn = document.getElementById('submitBtn');

        function showError(msg) {
            successMsg.classList.remove('show');
            errorText.textContent = msg;
            errorMsg.classList.add('show');
        }

        function showSuccess(msg) {
            errorMsg.classList.remove('show');
            successText.textContent = msg;
            successMsg.classList.add('show');
        }

        function setLoading(loading) {
            submitBtn.disabled = loading;
            submitBtn.classList.toggle('loading', loading);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');

            const trainer_name = document.getElementById('trainerName').value.trim();
            const access_key = document.getElementById('accessKey').value.trim();

            if (!trainer_name) { showError('Please enter your name'); return; }
            if (!access_key) { showError('Please enter your access key'); return; }

            setLoading(true);

            try {
                const res = await fetch(`${API_BASE}/trainers/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ trainer_name, access_key })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || 'Invalid credentials');
                    setLoading(false);
                    return;
                }

                showSuccess(`Welcome, ${data.user.name}! Redirecting...`);
                localStorage.setItem('gym_trainer', JSON.stringify(data.user));

                setTimeout(() => {
                    window.location.href = 'trainer-dashboard.html';
                }, 1000);
            } catch (err) {
                showError('Cannot connect to server. Ensure backend is running.');
                setLoading(false);
            }
        });
    </script>

</body>
</html>
