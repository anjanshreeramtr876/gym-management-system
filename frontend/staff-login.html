<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Staff Login - GymPro Management System">
    <title>Staff Login | GymPro Management System</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
    <style>
        .login-card .key-input-group {
            position: relative;
            margin-bottom: 20px;
        }
        .login-card .key-input-group .input-icon {
            position: absolute; left: 14px; top: 14px;
            font-size: 1.1rem; color: var(--text-muted);
            pointer-events: none; z-index: 1;
        }
        .login-card .key-input-group input {
            width: 100%; padding: 14px 14px 14px 44px;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text-primary);
            font-family: 'Courier New', monospace; font-size: 1.05rem;
            font-weight: 600; letter-spacing: 2px;
            transition: all var(--transition); box-sizing: border-box;
            text-transform: uppercase;
        }
        .login-card .key-input-group input:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
        }
        .login-card .key-input-group input::placeholder {
            color: var(--text-muted); letter-spacing: 1px; text-transform: none;
            font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 400;
        }
        .staff-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(59, 130, 246, 0.12); color: #60a5fa;
            padding: 6px 14px; border-radius: 20px; font-size: 0.75rem;
            font-weight: 600; letter-spacing: 0.5px;
            margin-top: 8px;
        }
        .divider {
            display: flex; align-items: center; gap: 16px;
            margin: 24px 0; color: var(--text-muted); font-size: 0.8rem;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px;
            background: var(--border);
        }
        .btn-admin-link {
            display: block; text-align: center;
            color: var(--text-secondary); font-size: 0.85rem;
            margin-top: 16px; transition: color var(--transition);
        }
        .btn-admin-link:hover { color: var(--accent); }
        .btn-admin-link span { color: var(--accent); font-weight: 600; }

        /* Override orbs for staff page – blue/purple theme */
        .login-page .orb-1 { background: #3b82f6; }
        .login-page .orb-2 { background: #8b5cf6; }
        .login-page .orb-3 { background: #06b6d4; }
    </style>
</head>
<body>

    <div class="login-page">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>

        <div class="login-card">
            <div class="brand">
                <div class="brand-icon">🏋️</div>
                <h1>GymPro</h1>
                <p>Staff Portal</p>
                <div class="staff-badge">👤 Staff Access</div>
            </div>

            <div class="form-title">Staff Sign In</div>

            <div class="error-message" id="errorMsg">
                <span>⚠️</span>
                <span id="errorText"></span>
            </div>

            <div class="success-message" id="successMsg">
                <span>✅</span>
                <span id="successText"></span>
            </div>

            <form id="staffLoginForm" autocomplete="off">
                <div class="input-group">
                    <span class="input-icon">👤</span>
                    <input type="text" id="staffName" placeholder="Enter your name" required autocomplete="name">
                </div>

                <div class="key-input-group">
                    <span class="input-icon">🔑</span>
                    <input type="text" id="accessKey" placeholder="Enter your access key" required autocomplete="off">
                </div>

                <button type="submit" class="btn-login" id="submitBtn">
                    <span class="btn-text" id="btnText">Sign In</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <div class="divider">or</div>

            <a href="login.html" class="btn-admin-link">
                Are you an admin? <span>Sign in here →</span>
            </a>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';

        // If already logged in as staff, redirect
        if (localStorage.getItem('gym_staff')) {
            window.location.href = 'staff-dashboard.html';
        }

        const form = document.getElementById('staffLoginForm');
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');
        const successMsg = document.getElementById('successMsg');
        const successText = document.getElementById('successText');
        const submitBtn = document.getElementById('submitBtn');

        function showError(msg) {
            successMsg.classList.remove('show');
            errorText.textContent = msg;
            errorMsg.classList.add('show');
        }

        function showSuccess(msg) {
            errorMsg.classList.remove('show');
            successText.textContent = msg;
            successMsg.classList.add('show');
        }

        function setLoading(loading) {
            submitBtn.disabled = loading;
            submitBtn.classList.toggle('loading', loading);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');

            const staff_name = document.getElementById('staffName').value.trim();
            const access_key = document.getElementById('accessKey').value.trim();

            if (!staff_name) {
                showError('Please enter your name');
                return;
            }

            if (!access_key) {
                showError('Please enter your access key');
                return;
            }

            setLoading(true);

            try {
                const res = await fetch(`${API_BASE}/staff/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ staff_name, access_key })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || 'Invalid access key');
                    setLoading(false);
                    return;
                }

                showSuccess(`Welcome, ${data.user.name}! Redirecting...`);
                localStorage.setItem('gym_staff', JSON.stringify(data.user));

                setTimeout(() => {
                    window.location.href = 'staff-dashboard.html';
                }, 1000);
            } catch (err) {
                showError('Cannot connect to server. Ensure backend is running.');
                setLoading(false);
            }
        });
    </script>

</body>
</html>
